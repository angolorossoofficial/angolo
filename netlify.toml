# Angolo Rosso — Netlify build config (git-linked deploy, client-owned site).
# Connect this repo in Netlify; a Sanity webhook -> Netlify build hook rebuilds
# the site whenever the redazione publishes in the Studio.
[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

# Serverless endpoints for public engagement (comments + votes). The custom
# routes are declared in each function via `export const config = { path }`:
#   POST /api/comment  -> netlify/functions/comment.mjs
#   POST /api/vote     -> netlify/functions/vote.mjs
# These need a server-side env var SANITY_WRITE_TOKEN (Sanity Editor token).
# Set it in Netlify: Site settings -> Environment variables. Never commit it.

# SPA-style 404 handled by Astro's static 404 page; no redirects needed.
